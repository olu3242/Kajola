name: Validate Skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate SKILL.md structure

    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md exists
        run: |
          if [ ! -f "production-platform-architect/SKILL.md" ]; then
            echo "❌ SKILL.md not found"
            exit 1
          fi
          echo "✅ SKILL.md exists"

      - name: Check YAML frontmatter
        run: |
          python3 - <<'EOF'
          import re
          with open("production-platform-architect/SKILL.md") as f:
              content = f.read()
          
          if not content.startswith("---"):
              print("❌ Missing YAML frontmatter")
              exit(1)
          
          match = re.search(r"^---\n(.*?)\n---", content, re.DOTALL)
          if not match:
              print("❌ Malformed frontmatter")
              exit(1)
          
          frontmatter = match.group(1)
          for field in ["name:", "description:"]:
              if field not in frontmatter:
                  print(f"❌ Missing required frontmatter field: {field}")
                  exit(1)
          
          print("✅ Frontmatter valid")
          print(f"✅ Skill length: {len(content)} chars")
          EOF

      - name: Check reference files
        run: |
          for file in sql-patterns.md output-template.md; do
            if [ ! -f "production-platform-architect/references/$file" ]; then
              echo "❌ Missing reference: $file"
              exit 1
            fi
            echo "✅ Found: references/$file"
          done

      - name: Check evals
        run: |
          if [ ! -f "production-platform-architect/evals/evals.json" ]; then
            echo "⚠️  No evals found (optional but recommended)"
          else
            python3 -c "import json; data=json.load(open('production-platform-architect/evals/evals.json')); assert 'evals' in data and len(data['evals']) > 0; print(f'✅ {len(data[\"evals\"])} eval(s) found')"
          fi

      - name: Summary
        run: echo "🎉 Kajola skill validation passed"
