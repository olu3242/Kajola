name: Database Migrations

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript checks
        run: |
          echo "--- TS web ---"
          npx tsc -p apps/web/tsconfig.json --noEmit
          echo "--- TS mobile ---"
          npx tsc -p apps/mobile/tsconfig.json --noEmit
          echo "--- TS api ---"
          npx tsc -p packages/api/tsconfig.json --noEmit
          echo "--- TS OK ---"

      - name: Lint web
        run: npm -w @kajola/web run lint

      - name: Validate migrations
        shell: pwsh
        run: |
          Write-Host "--- Migration validation ---"
          ./scripts/migrations/validate.ps1
          Write-Host "--- Migrations OK ---"

      - name: Require migration for schema-adjacent changes
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          $changed = git diff --name-only origin/${{ github.base_ref }}...HEAD
          Write-Host "Changed files ($($changed.Count)):"
          $changed | ForEach-Object { Write-Host "  $_" }
          $schemaTouch = $changed | Where-Object { $_ -match '(supabase/functions/.+\.(ts|sql)|packages/db/src/.+\.ts|apps/web/app/api/.+\.(ts|tsx))' }
          $migrationTouch = $changed | Where-Object { $_ -match '^supabase/migrations/.+\.sql$' }
          Write-Host "Schema-adjacent: $($schemaTouch -join ', ')"
          Write-Host "Migration files: $($migrationTouch -join ', ')"
          if ($schemaTouch -and -not $migrationTouch) {
            throw "Schema-adjacent changes require a migration or an explicit no-op migration."
          }
          Write-Host "--- Schema check OK ---"

  deploy-staging:
    name: Deploy Staging
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy migrations to staging
        shell: pwsh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_SUPABASE_DB_PASSWORD }}
        run: ./scripts/migrations/deploy.ps1 -Environment staging -ProjectRef "${{ secrets.STAGING_SUPABASE_PROJECT_REF }}"
      - uses: actions/upload-artifact@v4
        with:
          name: staging-migration-backup-marker
          path: artifacts/migration-backups

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push'
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy migrations to production
        shell: pwsh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}
        run: ./scripts/migrations/deploy.ps1 -Environment production -ProjectRef "${{ secrets.PROD_SUPABASE_PROJECT_REF }}"
      - uses: actions/upload-artifact@v4
        with:
          name: production-migration-backup-marker
          path: artifacts/migration-backups
